<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MF-IO Setup</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="bg">
  <main class="container">
    <header class="topbar">
      <h1>MF-IO Setup</h1>
      <p class="muted">Netzwerk konfigurieren und Gerät neu starten</p>
    </header>

    <section class="card">
      <div class="card-head">
        <h2>WLAN Scan</h2>
        <button id="scanBtn" class="btn">Scan starten</button>
      </div>
      <p class="muted">Tippe auf ein WLAN, um die SSID automatisch zu übernehmen.</p>
      <ul id="scanList" class="wifi-list"></ul>
    </section>

    <section class="card">
      <h2>Netzwerkdaten</h2>
      <div class="grid-2">
        <label>SSID
          <input id="ssid" placeholder="Mein WLAN" autocomplete="off" />
        </label>
        <label>Passwort
          <input id="password" type="password" placeholder="••••••••" />
        </label>
      </div>

      <label class="checkbox-row"><input type="checkbox" id="dhcp" checked /> DHCP automatisch</label>

      <div id="staticFields" class="grid-2 hidden">
        <label>IP
          <input id="ip" value="192.168.1.200" />
        </label>
        <label>Gateway
          <input id="gw" value="192.168.1.1" />
        </label>
        <label>Netmask
          <input id="mask" value="255.255.255.0" />
        </label>
        <label>DNS
          <input id="dns" value="8.8.8.8" />
        </label>
      </div>

      <div class="actions">
        <button id="saveBtn" class="btn btn-primary">Save &amp; Reboot</button>
        <a class="btn btn-ghost" href="/dashboard">Dashboard öffnen</a>
      </div>
      <p id="log" class="status"></p>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
