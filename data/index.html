<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MF-IO Dashboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <h1>MF-IO Dashboard</h1>
  <section>
    <h2>Relais</h2>
    <label>R1 <input type="checkbox" id="relay1"></label>
    <label>R2 <input type="checkbox" id="relay2"></label>
  </section>

  <section>
    <h2>Digitale Eingänge</h2>
    <div id="inputs"></div>
  </section>

  <section>
    <h2>Analog</h2>
    <div id="analogInfo"></div>
    <div id="analogOutWrap" class="hidden">
      <input type="range" min="0" max="4095" value="0" id="analogOut">
      <span id="analogOutVal">0</span>
    </div>
  </section>

  <section>
    <h2>System</h2>
    <pre id="system"></pre>
  </section>

  <script src="/app.js"></script>
</body>
</html>
